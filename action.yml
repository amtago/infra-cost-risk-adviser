name: tfx — Terraform Cost & Risk Analyzer
description: Analyzes a terraform plan or CloudFormation change set for cost delta, destructive changes, and security misconfigs. Posts findings as a PR comment.

inputs:
  plan-file:
    description: Path to the terraform plan JSON file (output of `terraform show -json`). Mutually exclusive with cfn-changeset-file.
    required: false

  cfn-changeset-file:
    description: Path to a CloudFormation change set JSON file (output of `aws cloudformation describe-change-set`). Mutually exclusive with plan-file.
    required: false

  cfn-template-file:
    description: Path to the CloudFormation template JSON file. Optional but recommended — enables attribute-level rule coverage (security groups, encryption, tags, etc.).
    required: false
    default: ''

  region:
    description: AWS region to use for pricing lookups.
    required: false
    default: us-east-1

  github-token:
    description: GitHub token used to post PR comments. Use `secrets.GITHUB_TOKEN`.
    required: false
    default: ${{ github.token }}

  comment-on-pr:
    description: Post tfx output as a PR comment. Set to 'false' to disable.
    required: false
    default: 'true'

  fail-on-critical:
    description: Fail the action step if tfx finds critical issues. Set to 'false' to warn only.
    required: false
    default: 'true'

outputs:
  net-delta-usd:
    description: Net monthly cost change in USD (positive = increase, negative = decrease).
    value: ${{ steps.run-tfx.outputs.net-delta-usd }}

  critical-count:
    description: Number of critical findings.
    value: ${{ steps.run-tfx.outputs.critical-count }}

  warning-count:
    description: Number of warning findings.
    value: ${{ steps.run-tfx.outputs.warning-count }}

  report-json:
    description: Full tfx report as a JSON string.
    value: ${{ steps.run-tfx.outputs.report-json }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.plan-file }}" ] && [ -z "${{ inputs.cfn-changeset-file }}" ]; then
          echo "::error::Either plan-file or cfn-changeset-file must be provided."
          exit 1
        fi
        if [ -n "${{ inputs.plan-file }}" ] && [ -n "${{ inputs.cfn-changeset-file }}" ]; then
          echo "::error::plan-file and cfn-changeset-file are mutually exclusive. Provide one, not both."
          exit 1
        fi

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        # No go.sum — zero external dependencies, stdlib only.
        cache: false

    - name: Build tfx
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        go build -o tfx ./cli/

    - name: Run tfx
      id: run-tfx
      shell: bash
      run: |
        set +e

        if [ -n "${{ inputs.cfn-changeset-file }}" ]; then
          # CloudFormation mode
          TEMPLATE_ARG=""
          if [ -n "${{ inputs.cfn-template-file }}" ]; then
            TEMPLATE_ARG="--template ${{ inputs.cfn-template-file }}"
          fi

          "${{ github.action_path }}/tfx" cfn "${{ inputs.cfn-changeset-file }}" \
            $TEMPLATE_ARG \
            --format json \
            --region "${{ inputs.region }}" \
            > /tmp/tfx-report.json
          TFX_EXIT=$?

          "${{ github.action_path }}/tfx" cfn "${{ inputs.cfn-changeset-file }}" \
            $TEMPLATE_ARG \
            --format text \
            --region "${{ inputs.region }}" \
            > /tmp/tfx-report.txt || true
        else
          # Terraform mode
          "${{ github.action_path }}/tfx" analyze "${{ inputs.plan-file }}" \
            --format json \
            --region "${{ inputs.region }}" \
            > /tmp/tfx-report.json
          TFX_EXIT=$?

          "${{ github.action_path }}/tfx" analyze "${{ inputs.plan-file }}" \
            --format text \
            --region "${{ inputs.region }}" \
            > /tmp/tfx-report.txt || true
        fi

        set -e

        # Extract summary fields
        NET_DELTA=$(jq '.summary.net_delta_usd // 0' /tmp/tfx-report.json)
        CRITICALS=$(jq '.summary.finding_counts.critical // 0' /tmp/tfx-report.json)
        WARNINGS=$(jq '.summary.finding_counts.warning // 0' /tmp/tfx-report.json)
        REPORT_JSON=$(cat /tmp/tfx-report.json)

        echo "net-delta-usd=$NET_DELTA"   >> "$GITHUB_OUTPUT"
        echo "critical-count=$CRITICALS"  >> "$GITHUB_OUTPUT"
        echo "warning-count=$WARNINGS"    >> "$GITHUB_OUTPUT"

        # report-json may be multi-line — use EOF delimiter
        {
          echo "report-json<<TFX_EOF"
          echo "$REPORT_JSON"
          echo "TFX_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "TFX_EXIT=$TFX_EXIT"         >> "$GITHUB_ENV"
        echo "TFX_CRITICALS=$CRITICALS"   >> "$GITHUB_ENV"

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        CRITICALS="${TFX_CRITICALS:-0}"

        if [ "$CRITICALS" -gt 0 ]; then
          BADGE="🔴 **$CRITICALS critical finding(s)**"
        else
          BADGE="✅ No critical findings"
        fi

        if [ -n "${{ inputs.cfn-changeset-file }}" ]; then
          REPORT_TITLE="tfx — CloudFormation Cost & Risk Report"
          MARKER="<!-- tfx-cfn -->"
        else
          REPORT_TITLE="tfx — Terraform Cost & Risk Report"
          MARKER="<!-- tfx-terraform -->"
        fi

        BODY=$(cat <<COMMENT
        $MARKER
        ## $REPORT_TITLE

        $BADGE

        <details>
        <summary>Full report</summary>

        \`\`\`
        $(cat /tmp/tfx-report.txt)
        \`\`\`

        </details>

        <sub>Generated by [tfx](https://github.com/amtago/infra-cost-risk-adviser) on commit ${{ github.sha }}</sub>
        COMMENT
        )

        # Delete any previous tfx comment of the same type on this PR, then post fresh
        gh api \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" \
        | xargs -I{} gh api --method DELETE \
          "repos/${{ github.repository }}/issues/comments/{}" || true

        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body "$BODY"

    - name: Evaluate exit
      shell: bash
      run: |
        INPUT_FILE="${{ inputs.plan-file }}${{ inputs.cfn-changeset-file }}"
        if [ "${{ inputs.fail-on-critical }}" = "true" ] && [ "${TFX_EXIT:-0}" = "2" ]; then
          echo "::error::tfx found ${TFX_CRITICALS} critical issue(s). Review the PR comment or run tfx against: $INPUT_FILE"
          exit 2
        fi
