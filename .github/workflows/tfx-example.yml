name: Cost & Risk Analysis (Terraform + CloudFormation)

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.json'   # pick up CFN templates and change sets

permissions:
  contents: read
  pull-requests: write  # required to post PR comments

jobs:
  # ── Terraform ────────────────────────────────────────────────────────────────
  tfx-terraform:
    name: Terraform plan analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: ./terraform   # adjust to your tf root

      - name: Terraform plan
        run: |
          terraform plan -out tfplan.binary
          terraform show -json tfplan.binary > plan.json
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1

      - name: Run tfx
        uses: amtago/infra-cost-risk-adviser@main
        with:
          plan-file:           ./terraform/plan.json
          region:              us-east-1
          github-token:        ${{ secrets.GITHUB_TOKEN }}
          comment-on-pr:       'true'
          fail-on-critical:    'true'
          # required-tags-file: .github/required-tags.txt  # optional: override default Env/Team tags

  # ── CloudFormation ────────────────────────────────────────────────────────────
  tfx-cfn:
    name: CloudFormation change set analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create and describe change set
        run: |
          aws cloudformation create-change-set \
            --stack-name my-stack \
            --change-set-name cs-${{ github.run_id }} \
            --template-body file://template.json \
            --capabilities CAPABILITY_NAMED_IAM
          aws cloudformation wait change-set-create-complete \
            --stack-name my-stack \
            --change-set-name cs-${{ github.run_id }}
          aws cloudformation describe-change-set \
            --stack-name my-stack \
            --change-set-name cs-${{ github.run_id }} > changeset.json

      - name: Run tfx
        uses: amtago/infra-cost-risk-adviser@main
        with:
          cfn-changeset-file:  changeset.json
          cfn-template-file:   template.json
          region:              us-east-1
          github-token:        ${{ secrets.GITHUB_TOKEN }}
          comment-on-pr:       'true'
          fail-on-critical:    'true'
          # required-tags-file: .github/required-tags.txt  # optional: override default Env/Team tags
